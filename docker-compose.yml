services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payment_gateway
      POSTGRES_USER: payments
      POSTGRES_PASSWORD: payments_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments -d payment_gateway"]
      interval: 5s
      timeout: 5s
      retries: 20

  payment-gateway:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://payments:payments_password@postgres:5432/payment_gateway
      PAYMENT_ADMIN_API_KEY: ${PAYMENT_ADMIN_API_KEY:-admin-dev-key}
    ports:
      - "8010:8010"
    depends_on:
      postgres:
        condition: service_healthy

  payment-admin:
    build:
      context: ./frontend
    environment:
      VITE_API_PROXY_TARGET: http://payment-gateway:8010
      PAYMENT_ADMIN_API_KEY: ${PAYMENT_ADMIN_API_KEY:-admin-dev-key}
    ports:
      - "6750:6750"
    depends_on:
      - payment-gateway

volumes:
  postgres_data:
