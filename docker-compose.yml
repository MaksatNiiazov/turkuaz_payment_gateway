services:
  payment-gateway:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/data/payment_gateway.db
    volumes:
      - payment_gateway_data:/app/data
    ports:
      - "8502:8502"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8502/api/v1/ready', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 10

  payment-admin:
    build:
      context: ..
      dockerfile: PaymentGateway/frontend/Dockerfile
    environment:
      VITE_API_PROXY_TARGET: http://payment-gateway:8502
      VITE_IDENTITY_PROXY_TARGET: http://host.docker.internal:8500
    ports:
      - "7502:7502"
    depends_on:
      payment-gateway:
        condition: service_healthy

volumes:
  payment_gateway_data:
